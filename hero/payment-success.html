<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful — Hero LMS</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/typography.css" />
  <link rel="stylesheet" href="../css/animations.css" />
  <link rel="stylesheet" href="../css/buttons.css" />
  <link rel="stylesheet" href="../css/utilities.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0; min-height: 100vh;
      background: linear-gradient(135deg, var(--h2eo-navy) 0%, #0f2d52 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-body, sans-serif);
    }
    .success-card {
      background: white; border-radius: 24px;
      padding: 56px 48px; max-width: 520px; width: 90%;
      text-align: center;
      box-shadow: 0 40px 100px rgba(0,0,0,0.35);
      animation: scaleIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    .success-icon {
      width: 88px; height: 88px; border-radius: 50%;
      background: linear-gradient(135deg, #0d9488, #0ea5e9);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; margin: 0 auto 28px;
      box-shadow: 0 12px 32px rgba(13,148,136,0.35);
    }
    .success-card h1 {
      font-family: var(--font-display, sans-serif);
      font-size: 2rem; color: var(--h2eo-navy, #0a1628);
      margin: 0 0 12px;
    }
    .success-card p {
      font-size: 1rem; color: var(--text-muted, #64748b);
      line-height: 1.6; margin: 0 0 8px;
    }
    .success-detail {
      background: var(--gray-50, #f8fafc);
      border-radius: 12px; padding: 16px 20px;
      margin: 24px 0;
      font-size: 0.875rem; color: var(--text-secondary, #475569);
      text-align: left;
    }
    .success-detail strong { color: var(--h2eo-navy, #0a1628); }
    .success-card .btn {
      width: 100%; justify-content: center;
      font-size: 1rem; padding: 14px 24px;
    }
    .countdown {
      font-size: 0.8rem; color: var(--text-muted, #94a3b8);
      margin-top: 14px;
    }
    .error-state { display: none; }
    .error-state h1 { color: #dc2626; }
  </style>
</head>
<body>

  <div class="success-card" id="successCard">
    <div class="success-icon">🎉</div>
    <h1>You're in!</h1>
    <p>Your payment was successful and your access has been activated.</p>
    <div class="success-detail" id="purchaseDetail">
      <strong>Loading details…</strong>
    </div>
    <button class="btn btn-primary" id="continueBtn" onclick="goToCourse()">
      Start Learning →
    </button>
    <p class="countdown" id="countdown">Redirecting in <strong id="countNum">5</strong> seconds…</p>
  </div>

  <div class="success-card error-state" id="errorCard">
    <div class="success-icon" style="background:linear-gradient(135deg,#ef4444,#f97316);">⚠️</div>
    <h1>Something went wrong</h1>
    <p>We couldn't activate your access automatically. Please contact support — your payment was processed successfully.</p>
    <a href="index.html" class="btn btn-secondary" style="display:inline-flex;margin-top:8px;">
      Go to Dashboard
    </a>
  </div>

<div id="toast-container" role="region" aria-label="Notifications" aria-live="polite"></div>

<script src="../js/core.js"></script>
<script src="js/oauth-config.js"></script>
<script src="js/access-control.js"></script>
<script>
(function () {
  'use strict';

  /* ── Read URL params (Stripe appends ?plan=... in success URL) ── */
  const urlParams   = new URLSearchParams(window.location.search);
  const planParam   = urlParams.get('plan')   || localStorage.getItem('heroPaymentPlan')   || '';
  const returnParam = urlParams.get('return') || localStorage.getItem('heroPaymentReturn') || '/hero/courses/activate-superpowers/index.html';

  /* ── Clean up localStorage ── */
  localStorage.removeItem('heroPaymentPlan');
  localStorage.removeItem('heroPaymentReturn');

  /* ── Get logged-in user ── */
  let user = null;
  try { user = JSON.parse(localStorage.getItem('heroUser')); } catch { /**/ }

  const email = user?.email || null;

  /* ── Activate access ── */
  const detailEl = document.getElementById('purchaseDetail');
  let activated = false;

  if (!email) {
    // No user session — show error
    document.getElementById('successCard').style.display = 'none';
    document.getElementById('errorCard').style.display   = 'block';
  } else if (planParam.startsWith('course:')) {
    // Adult course purchase
    const courseId = planParam.replace('course:', '');
    HeroAccess.activatePurchase(email, courseId);
    const cfg     = window.HERO_AUTH_CONFIG?.stripe?.courses?.[courseId];
    const title   = cfg?.title || courseId;
    detailEl.innerHTML = `
      <strong>Course Unlocked:</strong> ${title}<br/>
      <span>Account: ${email}</span><br/>
      <span>Access: Lifetime ♾️</span>
    `;
    activated = true;
  } else if (planParam === 'k12-monthly' || planParam === 'k12-annual') {
    // K-12 subscription
    HeroAccess.activateSubscription(email, planParam);
    const cfg       = planParam === 'k12-annual'
      ? window.HERO_AUTH_CONFIG?.stripe?.k12Annual
      : window.HERO_AUTH_CONFIG?.stripe?.k12Monthly;
    const expiresAt = JSON.parse(localStorage.getItem(HeroAccess.keys.subscription(email)) || '{}').expiresAt || '';
    const expDate   = expiresAt ? new Date(expiresAt).toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' }) : '';
    detailEl.innerHTML = `
      <strong>Subscription Active:</strong> ${cfg?.label || planParam}<br/>
      <span>Account: ${email}</span><br/>
      ${expDate ? `<span>Expires: ${expDate}</span>` : ''}
    `;
    activated = true;
  } else {
    // Unknown plan — still show success but no activation needed
    detailEl.innerHTML = `
      <strong>Payment received</strong><br/>
      <span>Account: ${email}</span>
    `;
    activated = true;
  }

  /* ── Countdown redirect ── */
  let returnPath = returnParam;
  // Make sure returnParam is a safe local path
  if (!returnPath.startsWith('/') && !returnPath.startsWith('http')) {
    returnPath = '/hero/index.html';
  }

  window.goToCourse = function () {
    window.location.href = returnPath;
  };

  if (activated) {
    let n = 5;
    const numEl = document.getElementById('countNum');
    const timer = setInterval(() => {
      n--;
      if (numEl) numEl.textContent = n;
      if (n <= 0) {
        clearInterval(timer);
        window.location.href = returnPath;
      }
    }, 1000);
  }

})();
</script>
</body>
</html>
